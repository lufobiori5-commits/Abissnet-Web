<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Abissnet — Dark Fiber Optic Hero</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #070a0f;
    --bg2:#0d121a;
    --brand:#f68732;             /* Abissnet orange (for text) */
    --glow:#ff2dbd;              /* pink/magenta fiber glow */
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; overflow:hidden; background: radial-gradient(1200px 900px at 25% 0%, var(--bg2), var(--bg));
    color:#e8edf3; font-family:Poppins,system-ui,Segoe UI,Roboto,Arial,sans-serif;
  }

  /* Full-screen hero */
  .hero{
    position:relative; width:100%; height:100vh;
  }
  /* Canvas host */
  #fiber3d{
    position:absolute; inset:0;
  }

  /* Overlay copy */
  .overlay{
    position:absolute; inset:4vmin auto auto 5vmin; z-index:10;
    pointer-events:none; user-select:none;
  }
  .kicker{
    display:inline-block; background:var(--brand); color:#121212;
    font:700 12px Orbitron,sans-serif; letter-spacing:.1em;
    padding:.45rem .65rem; border-radius:999px; margin-bottom:1rem;
    box-shadow:0 8px 25px rgba(0,0,0,.35);
  }
  .title{
    font: 900 clamp(42px, 7vw, 110px)/.85 Orbitron, sans-serif;
    margin:0; color:var(--brand); text-shadow:0 2px 0 rgba(0,0,0,.5);
  }
  .subtitle{
    margin:.6rem 0 0 0; max-width:45ch; opacity:.9; font-size:clamp(14px,1.6vw,18px);
  }

  /* Bottom-right hint */
  .hint{
    position:absolute; right:18px; bottom:16px; font-size:13px; opacity:.75;
  }

  /* Mobile: keep geometry light automatically via JS, but tighten UI here */
  @media (max-width: 640px){
    .subtitle{display:none}
  }
</style>
</head>
<body>
<div class="hero">
  <canvas id="fiber3d"></canvas>

  <div class="overlay">
    <span class="kicker">DARK FIBER</span>
    <h1 class="title">Siguri totale.</h1>
    <p class="subtitle">Glowing, high-density fiber optics — macro view with living pulses. Exactly the vibe from the reference, tailored for Abissnet’s hero.</p>
  </div>

  <div class="hint">Drag to orbit • Scroll to dolly</div>
</div>

<!-- Three.js + postprocessing (CDN) -->
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.161.0/build/three.module.js';
import { OrbitControls } from 'https://unpkg.com/three@0.161.0/examples/jsm/controls/OrbitControls.js';
import { EffectComposer } from 'https://unpkg.com/three@0.161.0/examples/jsm/postprocessing/EffectComposer.js';
import { RenderPass } from 'https://unpkg.com/three@0.161.0/examples/jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'https://unpkg.com/three@0.161.0/examples/jsm/postprocessing/UnrealBloomPass.js';

const CANVAS   = document.getElementById('fiber3d');
const DPR      = Math.min(2, window.devicePixelRatio || 1);

// Scene / camera / renderer
const scene = new THREE.Scene();
scene.background = null;

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);
camera.position.set(55, 18, 140);

const renderer = new THREE.WebGLRenderer({canvas: CANVAS, antialias: true, alpha: true});
renderer.setPixelRatio(DPR);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

// Post FX: bloom for neon look
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.25, 0.55, 0.02);
composer.addPass(bloom);

// Controls (feel free to remove in production)
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.06;
controls.minDistance = 60; controls.maxDistance = 220;

// Lighting — subtle, most light is emissive + bloom
scene.add(new THREE.AmbientLight(0xffffff, 0.15));
const key = new THREE.DirectionalLight(0xffffff, 0.35); key.position.set(50, 60, 40); scene.add(key);

// ---------- Fiber bundle ----------
const group = new THREE.Group();
scene.add(group);

const isMobile = window.innerWidth < 700 || window.innerHeight < 550;
const FIBERS   = isMobile ? 60 : 120;          // number of strands
const PULSES   = isMobile ? 1 : 2;             // light pulses per strand
const RING_R   = 12;                            // spawn ring radius
const LENGTH   = 220;                           // how far strands travel “forward”
const WAVE     = 18;                            // curvature amplitude
const GLOW     = new THREE.Color('#ff2dbd');   // pink/magenta glow

// Materials
const tubeMat = new THREE.MeshStandardMaterial({
  color: 0x8a2be2,
  emissive: GLOW,
  emissiveIntensity: 1.6,
  metalness: 0.25,
  roughness: 0.35
});
const tipMat = new THREE.MeshBasicMaterial({
  color: GLOW,
  toneMapped: false,
  transparent: true,
  opacity: 0.95
});
const pulseMat = new THREE.MeshBasicMaterial({
  color: GLOW,
  toneMapped: false,
  transparent: true,
  opacity: 1,
  blending: THREE.AdditiveBlending
});

// Geometry base
const tipGeo   = new THREE.SphereGeometry(1.65, 16, 16);
const pulseGeo = new THREE.SphereGeometry(1.1, 16, 16);

// Helpers: pseudo-noise so strands sway a little
const noise = (x,y,z) => {
  return Math.sin(x*0.31 + z*0.77) * 0.6 +
         Math.sin(y*0.23 + x*0.19 + z*0.11) * 0.4;
};

// Build one curve (Catmull-Rom), returns points and tube mesh
function makeCurve(seed){
  const a   = seed / FIBERS * Math.PI*2;
  const x0  = Math.cos(a) * RING_R;
  const y0  = Math.sin(a) * RING_R;
  const z0  = (Math.random()*2-1) * 4;

  // Control points
  const p0 = new THREE.Vector3(x0, y0, z0);
  const p1 = new THREE.Vector3(x0 + 10, y0 + 5, z0 + 8);
  const p2 = new THREE.Vector3( 20,  10*Math.sin(a*2),  0);
  const p3 = new THREE.Vector3( 60,  0,  16*Math.sin(a) );
  const p4 = new THREE.Vector3( 120, -2, -8*Math.cos(a*1.3) );
  const p5 = new THREE.Vector3( LENGTH, 0, 0 );

  const curve = new THREE.CatmullRomCurve3([p0,p1,p2,p3,p4,p5], false, "catmullrom", 0.25);
  const tube  = new THREE.TubeGeometry(curve, 180, isMobile ? 0.55 : 0.8, 8, false);
  const mesh  = new THREE.Mesh(tube, tubeMat);
  mesh.frustumCulled = false;

  // Tip (bright bokeh)
  const tip = new THREE.Mesh(tipGeo, tipMat);
  tip.position.copy(curve.getPointAt(1));
  mesh.add(tip);

  // Pulses (moving spheres along the curve)
  const pulses = [];
  for(let i=0;i<PULSES;i++){
    const s = new THREE.Mesh(pulseGeo, pulseMat);
    const offset = Math.random();
    s.userData = { t: offset, speed: 0.08 + Math.random()*0.12 };
    pulses.push(s);
    mesh.add(s);
  }
  return {curve, mesh, tip, pulses, p:[p1,p2,p3,p4], seed: Math.random()*1000};
}

// Build the whole bundle
const fibers = [];
for(let i=0;i<FIBERS;i++){
  const f = makeCurve(i);
  fibers.push(f);
  group.add(f.mesh);
}

// Subtle rotation
group.rotation.y = -0.6;
group.position.set(-90, 0, 0);

// ---------- Animate ----------
let last = performance.now();
function animate(now){
  const dt = (now - last) / 1000; last = now;

  // Organic sway + pulse travel
  const t = now/1000;
  for(const f of fibers){
    // animate control points slightly for a living feel
    let k = 0;
    for(const cp of f.p){
      const n = noise(cp.x*0.05 + t*0.6 + f.seed, cp.y*0.05 + k, cp.z*0.05);
      cp.y += Math.sin(t*0.6 + k) * 0.02 * WAVE * (0.15+k*0.05);
      cp.z += n * 0.03 * WAVE;
      k += 0.7;
    }

    // rebuild tube path smoothly (cheap because vertices are reused in place)
    // NOTE: replace geometry to reflect updated curve frames
    const newGeo = new THREE.TubeGeometry(f.curve, 180, isMobile ? 0.55 : 0.8, 8, false);
    f.mesh.geometry.dispose();
    f.mesh.geometry = newGeo;

    // move pulses
    for(const p of f.pulses){
      p.userData.t += p.userData.speed * dt;
      if(p.userData.t > 1) p.userData.t -= 1;
      const pos = f.curve.getPointAt(p.userData.t);
      p.position.copy(pos);
      const s = 0.8 + Math.sin((p.userData.t*6.283)+t*4)*0.4;
      p.scale.setScalar(1.0 + 0.9*s);
      p.material.opacity = 0.6 + 0.4*s;
    }
  }

  // gentle camera dolly with scroll
  const scroll = window.scrollY || 0;
  const factor = Math.min(1, scroll / (window.innerHeight*0.8));
  camera.position.z = 140 - factor*40;

  controls.update();
  composer.render();
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

// Resize handling
function onResize(){
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h; camera.updateProjectionMatrix();
  renderer.setSize(w, h); composer.setSize(w, h);
  bloom.setSize(w, h);
}
addEventListener('resize', onResize);

// Optional: slight parallax with mouse
document.addEventListener('pointermove', (e)=>{
  const nx =  (e.clientX / window.innerWidth ) * 2 - 1;
  const ny = -(e.clientY / window.innerHeight) * 2 + 1;
  group.rotation.y = -0.6 + nx * 0.15;
  group.rotation.x = ny * 0.08;
});
</script>
</body>
</html>
